version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - cd book-management-front
      - npm ci
  build:
    commands:
      - echo Frontend Build Started...
      - npm run build
artifacts:
  base-directory: book-management-front
  files:
    - '.next/**/*'
    - 'public/**/*'
    - 'package.json'
    - 'node_modules/**/*'